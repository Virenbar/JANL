name: Build Artifact - Test
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:
    outputs:
      version:
        description: "Artifact Version"
        value: ${{ jobs.build.outputs.version }}
jobs:
  build:
    name: Build
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
    outputs:
      version: ${{ steps.build.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build
        id: build
        uses: ./.github/actions/build

      - name: Test solution
        run: dotnet test --no-restore --no-build --verbosity normal /p:Configuration=Release
